<style>*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,Helvetica,sans-serif;background:#f5f7fb;color:#1f2937}
header{background:linear-gradient(135deg,#2563eb,#7c3aed);color:white;text-align:center;padding:75px 20px}
header h1{font-size:3.1rem;margin-bottom:12px}
header p{font-size:1.2rem;max-width:850px;margin:auto;line-height:1.5}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:25px}
.card{background:white;border-radius:24px;padding:32px;text-align:center;box-shadow:0 10px 25px rgba(0,0,0,.08);transition:.2s}
.card:hover{transform:translateY(-6px)}
.icon{font-size:3.2rem;margin-bottom:15px}
.card h2{margin-bottom:12px;color:#111827}
.card p{color:#555;line-height:1.45;margin-bottom:22px}
.btn{display:inline-block;background:#2563eb;color:white;padding:14px 24px;border-radius:16px;text-decoration:none;font-weight:900;box-shadow:0 5px 0 #1e40af}
.btn:hover{background:#1d4ed8}
.back-btn{display:inline-block;margin-bottom:25px;background:#7c3aed;color:white;padding:12px 18px;border-radius:14px;text-decoration:none;font-weight:900;box-shadow:0 5px 0 #5b21b6}
.section{background:white;border-radius:24px;padding:30px;box-shadow:0 10px 25px rgba(0,0,0,.08);margin-bottom:24px}
.list{display:grid;gap:14px;margin-top:18px}
.item{background:#eef2ff;border-left:7px solid #2563eb;border-radius:18px;padding:18px;font-weight:800}
footer{text-align:center;padding:30px;color:#666}
@media(max-width:700px){header h1{font-size:2.2rem}}</style>
