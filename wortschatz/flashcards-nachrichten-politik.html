<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcards – Nachrichten und Politik</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,Helvetica,sans-serif;background:#f5f7fb;color:#1f2937}
header{background:linear-gradient(135deg,#dc2626,#1cb0f6);color:white;text-align:center;padding:60px 20px}
header h1{font-size:2.8rem;margin-bottom:10px}
.container{max-width:1100px;margin:auto;padding:35px 20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:22px}
.card{height:170px;perspective:1000px;cursor:pointer}
.inner{position:relative;width:100%;height:100%;transition:transform .7s;transform-style:preserve-3d}
.card.flipped .inner{transform:rotateY(180deg)}
.front,.back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:24px;display:flex;align-items:center;justify-content:center;padding:18px;text-align:center;font-weight:900;font-size:1.35rem;box-shadow:0 10px 25px rgba(0,0,0,.08)}
.front{background:white}
.back{background:#dc2626;color:white;transform:rotateY(180deg)}
footer{text-align:center;padding:30px;color:#666}
</style>
</head>
<body>

<header>
<h1>🃏 Flashcards – Nachrichten und Politik</h1>
<p>Wortschatztraining</p>
</header>

<main class="container">
<section id="cardsGrid" class="grid"></section>
</main>

<footer>
<p>© 2026 – Deutschfachschaft</p>
</footer>

<script>
const cards = [
["das Wetter","el clima"],
["steigen","subir / aumentar"],
["die Hilfe","la ayuda"],
["die Menschen","las personas"],
["die Regierung","el gobierno"],
["berichten","informar"],
["das Gesetz","la ley"],
["die Polizei","la policía"],
["der Krieg","la guerra"],
["die Lösung","la solución"]
];

function renderCards(){
const grid = document.getElementById("cardsGrid");

cards.forEach(card => {
const div = document.createElement("div");
div.className = "card";

div.onclick = function(){
div.classList.toggle("flipped");
};

div.innerHTML = `
<div class="inner">
<div class="front">${card[0]}</div>
<div class="back">${card[1]}</div>
</div>
`;

grid.appendChild(div);
});
}

renderCards();
</script>

</body>
</html>
